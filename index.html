<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🌿 물주기 일지</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="물주기">
<meta name="theme-color" content="#3a5a3e">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --sage: #7d9a6e;
    --deep: #3a5a3e;
    --pale: #e8f0e3;
    --cream: #f5f0e8;
    --bark: #8b6b4a;
    --mist: #c8dbbf;
    --warn: #c97d4a;
    --soil: #2c1f0e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--cream);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── SPLASH SCREEN ── */
  #splash {
    position: fixed; inset: 0; z-index: 100;
    background: var(--deep);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    transition: opacity 0.8s ease, transform 0.8s ease;
  }
  #splash.hidden { opacity: 0; transform: translateY(-20px); pointer-events: none; }

  .splash-bg {
    position: absolute; inset: 0; overflow: hidden;
  }
  .leaf {
    position: absolute;
    opacity: 0.07;
    animation: leafDrift linear infinite;
  }
  @keyframes leafDrift {
    0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.07; }
    90%  { opacity: 0.07; }
    100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; }
  }

  .splash-title {
    font-family: 'Gowun Batang', serif;
    font-size: clamp(3rem, 10vw, 5.5rem);
    color: var(--pale);
    letter-spacing: 0.08em;
    text-align: center;
    position: relative;
    animation: fadeUp 1s ease 0.3s both;
  }
  .splash-sub {
    font-size: 0.9rem;
    color: var(--mist);
    letter-spacing: 0.3em;
    margin-top: 0.8rem;
    text-transform: uppercase;
    animation: fadeUp 1s ease 0.6s both;
  }
  .splash-icon {
    font-size: 5rem;
    margin-bottom: 1.5rem;
    animation: fadeUp 1s ease 0s both, sway 3s ease-in-out infinite 1s;
  }
  @keyframes sway {
    0%,100% { transform: rotate(-5deg); }
    50%      { transform: rotate(5deg); }
  }
  .splash-btn {
    margin-top: 3rem;
    padding: 0.85rem 2.5rem;
    background: transparent;
    border: 1.5px solid var(--mist);
    color: var(--mist);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.2em;
    cursor: pointer;
    transition: all 0.3s;
    animation: fadeUp 1s ease 1s both;
  }
  .splash-btn:hover {
    background: var(--mist);
    color: var(--deep);
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── MAIN APP ── */
  #app {
    max-width: 680px;
    margin: 0 auto;
    padding: 2rem 1.2rem 6rem;
    opacity: 0;
    transition: opacity 0.6s ease 0.2s;
  }
  #app.visible { opacity: 1; }

  .app-header {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    margin-bottom: 2rem;
    border-bottom: 1px solid var(--mist);
    padding-bottom: 1rem;
  }
  .app-header h1 {
    font-family: 'Gowun Batang', serif;
    font-size: 1.7rem;
    color: var(--deep);
  }
  .app-header span {
    font-size: 0.8rem;
    color: var(--sage);
    letter-spacing: 0.15em;
  }

  /* ADD FORM */
  .add-card {
    background: white;
    border: 1px solid var(--mist);
    border-radius: 16px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 2rem;
    box-shadow: 0 4px 20px rgba(60,90,62,0.06);
  }
  .add-card h2 {
    font-family: 'Gowun Batang', serif;
    font-size: 1rem;
    color: var(--deep);
    margin-bottom: 1rem;
  }
  .form-row {
    display: flex;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .form-group {
    display: flex;
    flex-direction: column;
    gap: 0.3rem;
    flex: 1;
    min-width: 120px;
  }
  .form-group label {
    font-size: 0.73rem;
    color: var(--sage);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .form-group input {
    border: 1px solid var(--mist);
    border-radius: 8px;
    padding: 0.6rem 0.85rem;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    color: var(--soil);
    background: var(--pale);
    outline: none;
    transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--sage); }

  .emoji-row {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    margin: 0.8rem 0;
  }
  .emoji-btn {
    font-size: 1.4rem;
    padding: 0.3rem 0.5rem;
    background: var(--pale);
    border: 1.5px solid transparent;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .emoji-btn.selected { border-color: var(--sage); background: var(--mist); }

  .add-submit {
    margin-top: 1rem;
    width: 100%;
    padding: 0.75rem;
    background: var(--deep);
    color: var(--pale);
    border: none;
    border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: background 0.2s;
  }
  .add-submit:hover { background: var(--sage); }


  /* ── TODAY BANNER ── */
  #todayBanner {
    display: none;
    margin-bottom: 1.6rem;
    animation: slideIn 0.5s ease;
  }
  .today-banner-inner {
    background: linear-gradient(135deg, #c97d4a 0%, #b5622e 100%);
    border-radius: 20px;
    padding: 1.4rem 1.6rem;
    position: relative;
    overflow: hidden;
  }
  .today-banner-inner::before {
    content: '💧';
    position: absolute;
    right: -0.8rem; top: -1.2rem;
    font-size: 7rem;
    opacity: 0.12;
    pointer-events: none;
  }
  .today-banner-label {
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.75);
    margin-bottom: 0.5rem;
  }
  .today-banner-headline {
    font-family: 'Gowun Batang', serif;
    font-size: 1.15rem;
    color: #fff;
    margin-bottom: 1rem;
  }
  .today-plant-list {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
  }
  .today-plant-row {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    background: rgba(255,255,255,0.13);
    border-radius: 12px;
    padding: 0.65rem 1rem;
    backdrop-filter: blur(4px);
  }
  .today-plant-row.overdue-row {
    background: rgba(0,0,0,0.18);
    border: 1px solid rgba(255,255,255,0.15);
  }
  .today-plant-emoji { font-size: 1.7rem; flex-shrink: 0; }
  .today-plant-info  { flex: 1; }
  .today-plant-name  {
    font-weight: 500;
    color: #fff;
    font-size: 0.95rem;
  }
  .today-plant-sub   {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.65);
    margin-top: 0.1rem;
  }
  .today-water-btn {
    padding: 0.4rem 1rem;
    background: rgba(255,255,255,0.22);
    border: 1.5px solid rgba(255,255,255,0.4);
    color: #fff;
    border-radius: 20px;
    font-size: 0.8rem;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s;
    font-family: 'Noto Sans KR', sans-serif;
  }
  .today-water-btn:hover  { background: rgba(255,255,255,0.35); }
  .today-water-btn.done   {
    background: rgba(255,255,255,0.08);
    border-color: rgba(255,255,255,0.2);
    color: rgba(255,255,255,0.45);
    cursor: default;
    text-decoration: line-through;
  }
  .today-banner-all-done {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    color: rgba(255,255,255,0.8);
    font-size: 0.9rem;
    padding: 0.4rem 0;
  }

  /* ── SCHEDULE SECTION ── */
  .schedule-panel {
    background: var(--deep);
    border-radius: 20px;
    padding: 1.4rem 1.6rem;
    margin-bottom: 2rem;
    color: var(--pale);
    overflow: hidden;
    position: relative;
  }
  .schedule-panel::before {
    content: '💧';
    position: absolute;
    right: -0.5rem; top: -1rem;
    font-size: 6rem;
    opacity: 0.06;
  }
  .schedule-panel-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1rem;
    color: var(--mist);
    margin-bottom: 1.2rem;
    letter-spacing: 0.05em;
  }

  .schedule-tabs {
    display: flex;
    gap: 0.4rem;
    margin-bottom: 1.2rem;
    background: rgba(255,255,255,0.06);
    border-radius: 10px;
    padding: 0.3rem;
  }
  .schedule-tab {
    flex: 1;
    padding: 0.4rem 0.6rem;
    background: none;
    border: none;
    color: var(--mist);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.78rem;
    border-radius: 7px;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }
  .schedule-tab.active {
    background: var(--sage);
    color: white;
  }

  /* Timeline view */
  .timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
  }
  .timeline-day {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    padding-bottom: 1rem;
    position: relative;
  }
  .timeline-day:not(:last-child)::before {
    content: '';
    position: absolute;
    left: 2.1rem;
    top: 2rem;
    bottom: 0;
    width: 1px;
    background: rgba(200,219,191,0.2);
  }
  .timeline-dot-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
    width: 4.2rem;
    text-align: center;
  }
  .timeline-date-label {
    font-size: 0.68rem;
    color: var(--mist);
    opacity: 0.7;
    line-height: 1.2;
  }
  .timeline-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    margin: 0.4rem auto 0;
    background: var(--mist);
    opacity: 0.5;
  }
  .timeline-dot.urgent { background: #e74c3c; opacity: 1; }
  .timeline-dot.today  { background: var(--warn); opacity: 1; }
  .timeline-dot.soon   { background: var(--mist); opacity: 1; }

  .timeline-plants {
    flex: 1;
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    padding-top: 0.1rem;
  }
  .timeline-chip {
    display: flex;
    align-items: center;
    gap: 0.35rem;
    background: rgba(255,255,255,0.09);
    border: 1px solid rgba(200,219,191,0.2);
    border-radius: 20px;
    padding: 0.3rem 0.7rem;
    font-size: 0.8rem;
    color: var(--pale);
    cursor: pointer;
    transition: background 0.15s;
  }
  .timeline-chip:hover { background: rgba(255,255,255,0.16); }
  .timeline-chip.urgent { border-color: rgba(231,76,60,0.5); }
  .timeline-chip.today-chip { border-color: rgba(201,125,74,0.6); }
  .timeline-chip-emoji { font-size: 1rem; }

  /* Calendar view */
  .cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 0.3rem;
  }
  .cal-header {
    text-align: center;
    font-size: 0.68rem;
    color: var(--mist);
    opacity: 0.6;
    padding-bottom: 0.2rem;
  }
  .cal-day {
    aspect-ratio: 1;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    position: relative;
    cursor: default;
    transition: background 0.15s;
  }
  .cal-day.empty { opacity: 0; pointer-events: none; }
  .cal-day.past-day { opacity: 0.3; }
  .cal-day.has-plants {
    background: rgba(125,154,110,0.25);
    border: 1px solid rgba(200,219,191,0.3);
    cursor: pointer;
  }
  .cal-day.has-plants:hover { background: rgba(125,154,110,0.4); }
  .cal-day.is-today {
    background: rgba(201,125,74,0.3);
    border: 1px solid rgba(201,125,74,0.5);
  }
  .cal-day.is-overdue {
    background: rgba(231,76,60,0.25);
    border: 1px solid rgba(231,76,60,0.4);
  }
  .cal-day-num {
    font-size: 0.72rem;
    color: var(--pale);
    line-height: 1;
  }
  .cal-day-dots {
    display: flex;
    gap: 2px;
    margin-top: 2px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 90%;
  }
  .cal-dot {
    font-size: 0.65rem;
    line-height: 1;
  }
  .cal-month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 0.8rem;
  }
  .cal-nav-btn {
    background: rgba(255,255,255,0.08);
    border: none;
    color: var(--mist);
    width: 28px; height: 28px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.15s;
  }
  .cal-nav-btn:hover { background: rgba(255,255,255,0.16); }
  .cal-month-label {
    font-family: 'Gowun Batang', serif;
    font-size: 0.9rem;
    color: var(--pale);
  }

  .schedule-empty {
    text-align: center;
    color: var(--mist);
    opacity: 0.5;
    font-size: 0.85rem;
    padding: 1.5rem;
  }

  /* PLANT CARDS */
  .section-title {
    font-family: 'Gowun Batang', serif;
    font-size: 1rem;
    color: var(--deep);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-title::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--mist);
  }

  .plants-grid {
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }

  .plant-card {
    background: white;
    border: 1px solid var(--mist);
    border-radius: 16px;
    padding: 1.2rem 1.4rem;
    display: flex;
    align-items: center;
    gap: 1.2rem;
    box-shadow: 0 2px 12px rgba(60,90,62,0.05);
    transition: transform 0.2s, box-shadow 0.2s;
    animation: slideIn 0.4s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-16px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  .plant-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(60,90,62,0.1); }
  .plant-card.due { border-left: 4px solid var(--warn); }
  .plant-card.overdue { border-left: 4px solid #c0392b; }

  .plant-emoji { font-size: 2.4rem; flex-shrink: 0; }

  .plant-info { flex: 1; min-width: 0; }
  .plant-name {
    font-family: 'Gowun Batang', serif;
    font-size: 1.05rem;
    color: var(--soil);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .plant-meta {
    font-size: 0.78rem;
    color: #888;
    margin-top: 0.15rem;
  }

  .plant-status {
    text-align: right;
    flex-shrink: 0;
  }
  .days-badge {
    display: inline-block;
    padding: 0.3rem 0.7rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 500;
    margin-bottom: 0.4rem;
  }
  .days-badge.ok     { background: var(--pale); color: var(--deep); }
  .days-badge.today  { background: #fff3e0; color: var(--warn); }
  .days-badge.past   { background: #fdecea; color: #c0392b; }

  .water-btn {
    display: block;
    padding: 0.35rem 0.9rem;
    background: var(--sage);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .water-btn:hover { background: var(--deep); }

  .delete-btn {
    background: none;
    border: none;
    color: #ccc;
    cursor: pointer;
    font-size: 1rem;
    padding: 0.2rem;
    margin-left: 0.4rem;
    transition: color 0.2s;
  }
  .delete-btn:hover { color: #c0392b; }

  /* HISTORY MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0; z-index: 50;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(4px);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--cream);
    border-radius: 20px;
    padding: 2rem;
    max-width: 400px;
    width: 90%;
    max-height: 80vh;
    overflow-y: auto;
    animation: popIn 0.3s ease;
  }
  @keyframes popIn {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .modal h3 {
    font-family: 'Gowun Batang', serif;
    font-size: 1.2rem;
    color: var(--deep);
    margin-bottom: 1rem;
  }
  .history-list { list-style: none; }
  .history-list li {
    padding: 0.5rem 0;
    border-bottom: 1px solid var(--mist);
    font-size: 0.85rem;
    color: #555;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .modal-close {
    margin-top: 1.2rem;
    width: 100%;
    padding: 0.6rem;
    background: var(--deep);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
  }

  .empty-state {
    text-align: center;
    color: #aaa;
    font-size: 0.9rem;
    padding: 3rem 1rem;
  }
  .empty-state .big { font-size: 3rem; margin-bottom: 0.8rem; }

  /* NOTIFICATION BANNER */
  .notif-bar {
    position: fixed;
    top: 1rem; left: 50%;
    transform: translateX(-50%);
    background: var(--deep);
    color: var(--pale);
    padding: 0.7rem 1.4rem;
    border-radius: 30px;
    font-size: 0.85rem;
    box-shadow: 0 4px 16px rgba(0,0,0,0.2);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
    white-space: nowrap;
  }
  .notif-bar.show { opacity: 1; }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-bg" id="leafBg"></div>
  <div class="splash-icon">🌿</div>
  <div class="splash-title">물주기<br>일지</div>
  <div class="splash-sub">Plant Watering Journal</div>
  <button class="splash-btn" onclick="enterApp()">시작하기 →</button>
</div>

<!-- APP -->
<div id="app">
  <div class="app-header">
    <h1>🌿 물주기 일지</h1>
    <span>WATERING JOURNAL</span>
  </div>

  <!-- ADD FORM -->
  <div class="add-card">
    <h2>새 식물 등록</h2>
    <div class="emoji-row" id="emojiRow"></div>
    <div class="form-row">
      <div class="form-group" style="flex:2;">
        <label>식물 이름</label>
        <input type="text" id="plantName" placeholder="예: 몬스테라">
      </div>
      <div class="form-group">
        <label>물주기 주기 (일)</label>
        <input type="number" id="plantInterval" placeholder="7" min="1" max="365">
      </div>
    </div>
    <div class="form-row" style="margin-top:0.8rem;">
      <div class="form-group">
        <label>마지막으로 물 준 날</label>
        <input type="date" id="lastWatered">
      </div>
    </div>
    <button class="add-submit" onclick="addPlant()">+ 식물 추가</button>
  </div>


  <!-- TODAY BANNER -->
  <div id="todayBanner">
    <div class="today-banner-inner">
      <div class="today-banner-label">오늘의 물주기</div>
      <div class="today-banner-headline" id="todayHeadline"></div>
      <div class="today-plant-list" id="todayPlantList"></div>
    </div>
  </div>

  <!-- SCHEDULE PANEL -->
  <div class="schedule-panel">
    <div class="schedule-panel-title">📅 물주기 일정</div>
    <div class="schedule-tabs">
      <button class="schedule-tab active" onclick="switchTab('timeline')">타임라인</button>
      <button class="schedule-tab" onclick="switchTab('calendar')">달력</button>
    </div>
    <div id="scheduleTimeline"></div>
    <div id="scheduleCalendar" style="display:none;"></div>
  </div>

  <!-- PLANT LIST -->
  <div class="section-title">내 식물들</div>
  <div class="plants-grid" id="plantsGrid">
    <div class="empty-state">
      <div class="big">🪴</div>
      아직 등록된 식물이 없어요.<br>위에서 식물을 추가해보세요!
    </div>
  </div>
</div>

<!-- HISTORY MODAL -->
<div class="modal-overlay" id="historyModal">
  <div class="modal">
    <h3 id="modalTitle">물주기 기록</h3>
    <ul class="history-list" id="historyList"></ul>
    <button class="modal-close" onclick="closeModal()">닫기</button>
  </div>
</div>

<!-- NOTIFICATION -->
<div class="notif-bar" id="notifBar"></div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
}
// ── SPLASH LEAVES ──
const leafBg = document.getElementById('leafBg');
for (let i = 0; i < 14; i++) {
  const l = document.createElement('div');
  l.className = 'leaf';
  const size = 40 + Math.random() * 80;
  l.style.cssText = `
    left: ${Math.random()*100}%;
    width: ${size}px; height: ${size}px;
    font-size: ${size}px;
    animation-duration: ${8 + Math.random()*10}s;
    animation-delay: ${-Math.random()*12}s;
  `;
  l.textContent = ['🍃','🌿','🍀','🌱'][Math.floor(Math.random()*4)];
  leafBg.appendChild(l);
}

function enterApp() {
  document.getElementById('splash').classList.add('hidden');
  setTimeout(() => {
    document.getElementById('app').classList.add('visible');
    document.getElementById('splash').style.display = 'none';
  }, 800);
}

// ── EMOJI PICKER ──
const EMOJIS = ['🌿','🪴','🌵','🌸','🌺','🌻','🌹','🍀','🌱','🎋','🎍','🍃'];
let selectedEmoji = '🌿';
const emojiRow = document.getElementById('emojiRow');
EMOJIS.forEach(e => {
  const btn = document.createElement('button');
  btn.className = 'emoji-btn' + (e === selectedEmoji ? ' selected' : '');
  btn.textContent = e;
  btn.onclick = () => {
    document.querySelectorAll('.emoji-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedEmoji = e;
  };
  emojiRow.appendChild(btn);
});

// Set default date to today
document.getElementById('lastWatered').value = new Date().toISOString().split('T')[0];

// ── DATA ──
let plants = JSON.parse(localStorage.getItem('plants_v2') || '[]');

function save() { localStorage.setItem('plants_v2', JSON.stringify(plants)); }

function daysDiff(dateStr) {
  const now = new Date(); now.setHours(0,0,0,0);
  const d = new Date(dateStr); d.setHours(0,0,0,0);
  return Math.round((d - now) / 86400000);
}

function addPlant() {
  const name = document.getElementById('plantName').value.trim();
  const interval = parseInt(document.getElementById('plantInterval').value);
  const last = document.getElementById('lastWatered').value;
  if (!name) return notify('식물 이름을 입력해주세요 🌱');
  if (!interval || interval < 1) return notify('물주기 주기를 입력해주세요 💧');
  if (!last) return notify('마지막 물준 날짜를 입력해주세요 📅');

  plants.push({
    id: Date.now(),
    emoji: selectedEmoji,
    name,
    interval,
    history: [last]
  });
  save();
  renderPlants();
  document.getElementById('plantName').value = '';
  document.getElementById('plantInterval').value = '';
  document.getElementById('lastWatered').value = new Date().toISOString().split('T')[0];
  notify(`${selectedEmoji} ${name} 등록 완료!`);
  renderTimeline();
  scheduleNotifications();
}

function waterPlant(id) {
  const p = plants.find(p => p.id === id);
  if (!p) return;
  const today = new Date().toISOString().split('T')[0];
  p.history.push(today);
  save();
  renderPlants();
  notify(`💧 ${p.name}에게 물을 줬어요!`);
  renderTimeline();
  renderTodayBanner();
}

function deletePlant(id) {
  const p = plants.find(p => p.id === id);
  if (!confirm(`"${p.name}"을 삭제할까요?`)) return;
  plants = plants.filter(p => p.id !== id);
  save();
  renderPlants();
}

function openHistory(id) {
  const p = plants.find(p => p.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = `${p.emoji} ${p.name} 물주기 기록`;
  const list = document.getElementById('historyList');
  list.innerHTML = p.history.length
    ? [...p.history].reverse().map(d => `<li>💧 ${d}</li>`).join('')
    : '<li>기록이 없어요</li>';
  document.getElementById('historyModal').classList.add('open');
}

function closeModal() {
  document.getElementById('historyModal').classList.remove('open');
}

function renderPlants() {
  const grid = document.getElementById('plantsGrid');
  if (!plants.length) {
    grid.innerHTML = `<div class="empty-state"><div class="big">🪴</div>아직 등록된 식물이 없어요.<br>위에서 식물을 추가해보세요!</div>`;
    return;
  }

  // Sort: overdue first, then due today, then by days remaining
  const withDays = plants.map(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    const nextStr = nextDate.toISOString().split('T')[0];
    const daysLeft = daysDiff(nextStr);
    return { ...p, daysLeft, nextStr };
  }).sort((a,b) => a.daysLeft - b.daysLeft);

  grid.innerHTML = withDays.map(p => {
    const d = p.daysLeft;
    let badge, cardClass = '';
    if (d < 0) {
      badge = `<span class="days-badge past">${Math.abs(d)}일 지남</span>`;
      cardClass = 'overdue';
    } else if (d === 0) {
      badge = `<span class="days-badge today">오늘!</span>`;
      cardClass = 'due';
    } else {
      badge = `<span class="days-badge ok">${d}일 후</span>`;
    }
    const last = p.history[p.history.length - 1];
    return `
      <div class="plant-card ${cardClass}">
        <div class="plant-emoji">${p.emoji}</div>
        <div class="plant-info">
          <div class="plant-name">${p.name}</div>
          <div class="plant-meta">매 ${p.interval}일마다 · 마지막: ${last}</div>
          <div style="margin-top:0.4rem;">
            <button onclick="openHistory(${p.id})" style="background:none;border:none;font-size:0.75rem;color:var(--sage);cursor:pointer;text-decoration:underline;padding:0;">기록 보기</button>
          </div>
        </div>
        <div class="plant-status">
          ${badge}
          <button class="water-btn" onclick="waterPlant(${p.id})">💧 물 줬어요</button>
        </div>
        <button class="delete-btn" onclick="deletePlant(${p.id})" title="삭제">✕</button>
      </div>`;
  }).join('');
}

// ── NOTIFICATIONS ──
function notify(msg) {
  const bar = document.getElementById('notifBar');
  bar.textContent = msg;
  bar.classList.add('show');
  setTimeout(() => bar.classList.remove('show'), 2500);
}

async function scheduleNotifications() {
  if (!('Notification' in window)) return;
  if (Notification.permission === 'default') {
    await Notification.requestPermission();
  }
  if (Notification.permission !== 'granted') return;

  plants.forEach(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    nextDate.setHours(9, 0, 0, 0);
    const msUntil = nextDate.getTime() - Date.now();
    if (msUntil > 0 && msUntil < 86400000 * 2) {
      setTimeout(() => {
        new Notification('🌿 물주기 알림', {
          body: `${p.emoji} ${p.name}에게 물을 줄 시간이에요!`,
          icon: '🌿'
        });
      }, msUntil);
    }
  });
}

function checkDueToday() {
  if (Notification.permission === 'granted') {
    const today = new Date().toISOString().split('T')[0];
    plants.forEach(p => {
      const last = p.history[p.history.length - 1];
      const nextDate = new Date(last);
      nextDate.setDate(nextDate.getDate() + p.interval);
      const nextStr = nextDate.toISOString().split('T')[0];
      if (nextStr <= today) {
        new Notification('🌿 물주기 알림', {
          body: `${p.emoji} ${p.name}에게 물을 줄 시간이에요!`,
        });
      }
    });
  }
}



// ── TODAY BANNER ──
function renderTodayBanner() {
  const banner = document.getElementById('todayBanner');
  const today = new Date().toISOString().split('T')[0];

  const urgent = plants.filter(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    return nextDate.toISOString().split('T')[0] <= today;
  });

  if (!urgent.length) {
    banner.style.display = 'none';
    return;
  }

  banner.style.display = 'block';

  const overdue = urgent.filter(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    return nextDate.toISOString().split('T')[0] < today;
  });
  const dueToday = urgent.filter(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    return nextDate.toISOString().split('T')[0] === today;
  });

  let headline = '';
  if (overdue.length && dueToday.length)
    headline = `${urgent.length}그루에게 물이 필요해요!`;
  else if (overdue.length)
    headline = `${overdue.length}그루, 물주기가 늦었어요`;
  else
    headline = `오늘 ${dueToday.length}그루에게 물을 주세요`;

  document.getElementById('todayHeadline').textContent = headline;

  const list = document.getElementById('todayPlantList');
  list.innerHTML = urgent.map(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    const nextStr = nextDate.toISOString().split('T')[0];
    const isOverdue = nextStr < today;
    const daysPast = isOverdue
      ? Math.round((new Date(today) - new Date(nextStr)) / 86400000)
      : 0;
    const sub = isOverdue
      ? `${daysPast}일 늦었어요 · 마지막: ${last}`
      : `오늘이 물주는 날 · 마지막: ${last}`;
    return `<div class="today-plant-row ${isOverdue ? 'overdue-row' : ''}" id="todayRow-${p.id}">
      <div class="today-plant-emoji">${p.emoji}</div>
      <div class="today-plant-info">
        <div class="today-plant-name">${p.name}</div>
        <div class="today-plant-sub">${sub}</div>
      </div>
      <button class="today-water-btn" id="todayBtn-${p.id}" onclick="waterFromBanner(${p.id})">💧 물 줬어요</button>
    </div>`;
  }).join('');
}

function waterFromBanner(id) {
  const btn = document.getElementById('todayBtn-' + id);
  if (btn && btn.classList.contains('done')) return;
  waterPlant(id);
  if (btn) {
    btn.textContent = '✓ 완료';
    btn.classList.add('done');
  }
  // re-check if all done
  const allDone = document.querySelectorAll('.today-water-btn:not(.done)').length === 0;
  if (allDone) {
    setTimeout(() => {
      document.getElementById('todayBanner').style.display = 'none';
    }, 900);
  }
}

// ── SCHEDULE ──
let currentTab = 'timeline';
let calYear, calMonth;

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.schedule-tab').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('scheduleTimeline').style.display = tab === 'timeline' ? '' : 'none';
  document.getElementById('scheduleCalendar').style.display = tab === 'calendar' ? '' : 'none';
  if (tab === 'calendar') renderCalendar();
}

function getScheduleMap() {
  const map = {};
  plants.forEach(p => {
    const last = p.history[p.history.length - 1];
    const nextDate = new Date(last);
    nextDate.setDate(nextDate.getDate() + p.interval);
    nextDate.setHours(0,0,0,0);
    const key = nextDate.toISOString().split('T')[0];
    if (!map[key]) map[key] = [];
    map[key].push(p);
  });
  return map;
}

function renderTimeline() {
  const el = document.getElementById('scheduleTimeline');
  if (!plants.length) {
    el.innerHTML = '<div class="schedule-empty">식물을 등록하면 일정이 표시됩니다</div>';
    return;
  }
  const today = new Date(); today.setHours(0,0,0,0);
  const map = getScheduleMap();
  const sorted = Object.keys(map).sort();

  if (!sorted.length) {
    el.innerHTML = '<div class="schedule-empty">곧 물줄 식물이 없어요 🎉</div>';
    return;
  }

  const rows = sorted.map(dateStr => {
    const ps = map[dateStr] || [];
    if (!ps.length) return '';
    const d = new Date(dateStr); d.setHours(0,0,0,0);
    const diff = Math.round((d - today) / 86400000);
    let dotClass = diff < 0 ? 'urgent' : diff === 0 ? 'today' : 'soon';
    let dateLabel;
    if (diff < 0) dateLabel = `<span style="color:#e74c3c;font-size:0.7rem;">${Math.abs(diff)}일 지남</span>`;
    else if (diff === 0) dateLabel = `<span style="color:var(--warn);font-size:0.7rem;">오늘</span>`;
    else if (diff === 1) dateLabel = `<span style="font-size:0.7rem;">내일</span>`;
    else dateLabel = `<span style="font-size:0.7rem;">${diff}일 후</span>`;
    const mo = (d.getMonth()+1).toString().padStart(2,'0');
    const dy = d.getDate().toString().padStart(2,'0');
    const chips = ps.map(p => {
      const chipClass = diff < 0 ? 'urgent' : diff === 0 ? 'today-chip' : '';
      return `<div class="timeline-chip ${chipClass}" onclick="waterPlant(${p.id})" title="${p.name}에게 물 주기">
        <span class="timeline-chip-emoji">${p.emoji}</span>
        <span>${p.name}</span>
        ${diff <= 0 ? '<span style="font-size:0.7rem;opacity:0.7;">💧</span>' : ''}
      </div>`;
    }).join('');
    return `<div class="timeline-day">
      <div class="timeline-dot-wrap">
        <div class="timeline-date-label">${mo}/${dy}<br>${dateLabel}</div>
        <div class="timeline-dot ${dotClass}"></div>
      </div>
      <div class="timeline-plants">${chips}</div>
    </div>`;
  }).filter(Boolean).join('');

  el.innerHTML = rows ? `<div class="timeline">${rows}</div>` : '<div class="schedule-empty">곧 물줄 식물이 없어요 🎉</div>';
}

function renderCalendar() {
  const el = document.getElementById('scheduleCalendar');
  const today = new Date(); today.setHours(0,0,0,0);
  if (!calYear) { calYear = today.getFullYear(); calMonth = today.getMonth(); }
  const map = getScheduleMap();
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth + 1, 0);
  const startDow = firstDay.getDay();
  const DAYS = ['일','월','화','수','목','금','토'];
  let html = `<div class="cal-month-nav">
    <button class="cal-nav-btn" onclick="calNav(-1)">&#8249;</button>
    <span class="cal-month-label">${calYear}년 ${calMonth+1}월</span>
    <button class="cal-nav-btn" onclick="calNav(1)">&#8250;</button>
  </div>
  <div class="cal-grid">
    ${DAYS.map(d => `<div class="cal-header">${d}</div>`).join('')}`;
  for (let i = 0; i < startDow; i++) html += `<div class="cal-day empty"></div>`;
  for (let d = 1; d <= lastDay.getDate(); d++) {
    const dateObj = new Date(calYear, calMonth, d);
    dateObj.setHours(0,0,0,0);
    const key = dateObj.toISOString().split('T')[0];
    const ps = map[key] || [];
    const isPast = dateObj < today;
    const isToday = dateObj.getTime() === today.getTime();
    const isOverdue = isPast && ps.length > 0;
    let cls = 'cal-day';
    if (ps.length) cls += isOverdue ? ' is-overdue has-plants' : isToday ? ' is-today has-plants' : ' has-plants';
    else if (isToday) cls += ' is-today';
    else if (isPast) cls += ' past-day';
    const dots = ps.slice(0,4).map(p => `<span class="cal-dot">${p.emoji}</span>`).join('');
    const titleAttr = ps.length ? `title="${ps.map(p=>p.name).join(', ')}"` : '';
    html += `<div class="${cls}" ${titleAttr}${ps.length ? ` onclick="calDayClick('${key}')"` : ''}>
      <span class="cal-day-num">${d}</span>
      ${dots ? `<div class="cal-day-dots">${dots}</div>` : ''}
    </div>`;
  }
  html += '</div>';
  el.innerHTML = html;
}

function calNav(dir) {
  calMonth += dir;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  if (calMonth < 0)  { calMonth = 11; calYear--; }
  renderCalendar();
}

function calDayClick(dateStr) {
  const map = getScheduleMap();
  const ps = map[dateStr] || [];
  if (!ps.length) return;
  notify('💧 ' + ps.map(p => p.emoji + p.name).join(', ') + ' 물주는 날!');
}

// ── INIT ──
renderPlants();
renderTimeline();
renderTodayBanner();
if ('Notification' in window && Notification.permission === 'granted') {
  checkDueToday();
} else if ('Notification' in window && plants.length > 0) {
  Notification.requestPermission();
}
</script>
</body>
</html>
